services:
  datos_usuarios:
    image: postgres:latest
    environment:
      POSTGRES_USER: alfonso
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: bd_usuarios
    volumes:
      - ./micro-usuarios/micro-usuarios-bd.sql:/docker-entrypoint-initdb.d/micro-usuarios-bd.sql
      - volumen_usuarios:/var/lib/postgresql/18/docker

  usuarios:
    build:
      context: ./micro-usuarios
      dockerfile: Dockerfile
    environment:
      DB_HOST: datos_usuarios
      DB_NAME: bd_usuarios
      DB_USER: alfonso
      DB_PASSWORD: 1234
    depends_on:
      - datos_usuarios
    ports:
      - "8081:8080"

  datos_proyectos:
    image: postgres:latest
    environment:
      POSTGRES_USER: alfonso
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: bd_proyectos
    volumes:
      - ./micro-proyectos/micro-proyectos-bd.sql:/docker-entrypoint-initdb.d/micro-proyectos-bd.sql
      - volumen_proyectos:/var/lib/postgresql/18/docker

  proyectos:
    build:
      context: ./micro-proyectos
      dockerfile: Dockerfile
    environment:
      #DB_TYPE: MONGO
      DB_TYPE: POSTGRES
      DB_HOST: datos_proyectos
      DB_NAME: bd_proyectos
      DB_USER: alfonso
      DB_PASSWORD: 1234
      # Variables para Mongo
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_DB: proyectos_logs
    depends_on:
      - datos_proyectos
      - mongo
    ports:
      - "8082:8080"

  mongo:
    image: mongo:latest
    container_name: mongo
    environment:
      MONGO_INITDB_DATABASE: proyectos_logs
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express
    ports:
      - "8083:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: 27017
    depends_on:
      - mongo

volumes:
  volumen_usuarios:
  volumen_proyectos:
  mongo_data:
